name: Deploy to Xserver (nikko-maedori.jp)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 10022 -H sv14496.xserver.jp >> ~/.ssh/known_hosts

      - name: Deploy theme via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -p 10022 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            wp-content/themes/oheya360/ \
            ksworkers@sv14496.xserver.jp:/home/ksworkers/nikko-maedori.jp/public_html/wp-content/themes/oheya360/

      - name: Deploy sync.py
        run: |
          rsync -avz \
            -e "ssh -p 10022 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            sync.py \
            ksworkers@sv14496.xserver.jp:/home/ksworkers/nikko-maedori.jp/public_html/sync.py
