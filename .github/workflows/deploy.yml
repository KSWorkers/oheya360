name: Deploy to Xserver (nikko-maedori.jp)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Xserver to known_hosts
        run: ssh-keyscan -p 10022 -H sv14496.xserver.jp >> ~/.ssh/known_hosts

      - name: Deploy theme via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -p 10022 -o StrictHostKeyChecking=no" \
            wp-content/themes/oheya360/ \
            ksworkers@sv14496.xserver.jp:/home/ksworkers/nikko-maedori.jp/public_html/wp-content/themes/oheya360/

      - name: Deploy sync.py
        run: |
          rsync -avz \
            -e "ssh -p 10022 -o StrictHostKeyChecking=no" \
            sync.py \
            ksworkers@sv14496.xserver.jp:/home/ksworkers/nikko-maedori.jp/public_html/sync.py
